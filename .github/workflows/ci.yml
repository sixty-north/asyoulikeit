name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  readme-check:
    name: README.md is in sync with the generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          cache-dependency-glob: pyproject.toml

      - name: Install dev dependencies
        run: uv sync

      - name: Verify README.md matches the generator's output
        run: uv run python scripts/generate_readme.py --check

  docs-build:
    # Validates the Sphinx site builds cleanly (with warnings treated as
    # errors) on every push and pull request. This is the PR-time check
    # that catches regressions before merge; release.yml runs the same
    # check as one of the gates for release-time Pages deployment.
    name: Sphinx docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          cache-dependency-glob: pyproject.toml

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Build the Sphinx site with -W
        run: uv run --group docs sphinx-build -b html -W docs docs/_build/html
