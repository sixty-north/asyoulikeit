name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  readme-check:
    name: README.md is in sync with the generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          cache-dependency-glob: pyproject.toml

      - name: Install dev dependencies
        run: uv sync

      - name: Verify README.md matches the generator's output
        run: uv run python scripts/generate_readme.py --check
