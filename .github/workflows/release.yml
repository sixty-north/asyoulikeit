name: Release

# Atomic release workflow: on a ``v*`` tag produced by bump-my-version,
# runs the full test matrix and the strict Sphinx build in parallel as
# two gates. Only when BOTH gates are green does anything get published
# — and then the two publications (PyPI + GitHub Pages) run in parallel.
# A failing test matrix or a failing docs build holds back both
# publications, so every shipped version has green tests, a warning-
# free docs build, a live PyPI package, and matching published docs as
# a single unit.
#
# Pages uses the artifact produced by ``docs-build`` (uploaded via
# ``actions/upload-pages-artifact``) and deployed by
# ``actions/deploy-pages`` in ``deploy-docs``. Keep both in this one
# workflow: the upload and deploy must share a workflow run.
#
# ``workflow_dispatch`` is enabled so a release can be re-attempted
# manually if one of the parallel publications fails transiently
# after the gates pass. Individual failed jobs can also be re-run
# from the Actions UI.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Default read-only permissions for the workflow; each publishing job
# narrows its own permissions to what it actually needs.
permissions:
  contents: read

jobs:
  test:
    # Reuses the matrix defined in test.yml so CI and Release exercise
    # the exact same test surface against the built wheel.
    uses: ./.github/workflows/test.yml

  docs-build:
    name: Build Sphinx site (strict, gate for release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          cache-dependency-glob: pyproject.toml

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Build the Sphinx site with -W
        run: uv run --group docs sphinx-build -b html -W docs docs/_build/html

      - name: Upload Pages artifact
        # deploy-docs (below) consumes this artifact via
        # actions/deploy-pages. The upload + deploy must happen in the
        # same workflow run.
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  publish-pypi:
    name: Publish to PyPI
    # Both gates must pass before any publication runs. If either
    # fails, neither this job nor deploy-docs executes.
    needs: [test, docs-build]
    runs-on: ubuntu-latest
    # The `pypi` GitHub deployment environment is the gate for PyPI
    # secrets (or trusted-publishing configuration).
    environment:
      name: pypi
      url: https://pypi.org/project/asyoulikeit/
    permissions:
      # Required if/when the project opts into PyPI trusted publishing
      # via OIDC. Harmless when using a token instead.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        # Uses UV_PUBLISH_TOKEN if set; otherwise uv falls back to PyPI
        # trusted publishing via the OIDC token minted by GitHub (works
        # when the project is registered as a trusted publisher under
        # the `pypi` environment in this repo).
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  deploy-docs:
    name: Deploy docs to GitHub Pages
    needs: [test, docs-build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Allow only one concurrent Pages deployment; don't cancel an
    # in-flight run because interrupting a deployment can leave Pages
    # in a stuck "pending" state.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
