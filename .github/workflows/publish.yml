name: Publish

# Triggered by v<X.Y.Z> tags produced by bump-my-version. Re-runs the
# full test matrix (via the reusable test.yml workflow) and only
# publishes to PyPI if every test job is green. The `needs: test`
# edge plus the `if: success()` default on `publish` enforce that
# ordering.

on:
  push:
    tags: ["v*"]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    # The `pypi` GitHub deployment environment is the gate for PyPI
    # secrets (or trusted-publishing configuration).
    environment: pypi
    permissions:
      # Required if/when the project opts into PyPI trusted publishing
      # via OIDC. Harmless when using a token instead.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        # Uses UV_PUBLISH_TOKEN if set; otherwise uv falls back to PyPI
        # trusted publishing via the OIDC token minted by GitHub (works
        # when the project is registered as a trusted publisher under
        # the `pypi` environment in this repo).
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
