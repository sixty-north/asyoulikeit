name: Test

# Reusable workflow: builds a wheel and runs the test suite against the
# installed wheel (not the source tree) on a matrix of OS × Python
# version. Called by ci.yml on push/PR and by publish.yml on v-tags so
# that publication always follows a green test run against the exact
# artefact shape users will install.

on:
  workflow_call:

jobs:
  resolve-python-versions:
    name: Resolve supported Python versions from pyproject classifiers
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.extract.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: extract
        name: Pick earliest + latest declared Python version
        # Reading the supported versions from the classifiers keeps the CI
        # matrix in sync with the published metadata. Runner ships a
        # stdlib tomllib; this requires Python >= 3.11 on the runner,
        # which ubuntu-latest provides.
        run: |
          versions=$(python - <<'PY'
          import json
          import re
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          declared = sorted(
              (
                  c.rsplit(" :: ", 1)[-1]
                  for c in data["project"]["classifiers"]
                  if re.match(r"^Programming Language :: Python :: 3\.\d+$", c)
              ),
              key=lambda v: tuple(map(int, v.split("."))),
          )
          if not declared:
              raise SystemExit("No 'Programming Language :: Python :: 3.x' classifiers found")
          selected = [declared[0], declared[-1]] if len(declared) >= 2 else declared
          print(json.dumps(selected))
          PY
          )
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: resolve-python-versions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJson(needs.resolve-python-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: pyproject.toml

      - name: Install dependency environment (without asyoulikeit itself)
        # Sync all dev/test deps into the venv but skip installing the
        # asyoulikeit project. We'll install it from a freshly-built wheel
        # below so tests exercise the distribution artifact; this is what
        # catches packaging blunders like missing package-data, omitted
        # entry points, or an unshipped py.typed marker.
        run: uv sync --no-install-project

      - name: Build wheel
        run: uv build

      - name: Install the built wheel into the test environment
        # Force bash so dist/*.whl expands on Windows runners too
        # (default pwsh does not glob the same way).
        shell: bash
        run: uv pip install dist/*.whl

      - name: Run tests against the installed wheel
        # --no-project stops uv from re-syncing the environment (which
        # would reinstate an editable install and defeat the point).
        run: uv run --no-project pytest -v
