name: Docs

# Deploys the Sphinx site to GitHub Pages on every push to master, plus
# on manual invocation from the Actions UI. The PR-time strict build
# check lives in ci.yml; this workflow is specifically about publishing.
#
# Uses GitHub's Pages-from-Actions flow: no gh-pages branch, no manual
# commits — the built HTML is uploaded as a Pages artifact and deployed
# by actions/deploy-pages directly. One-time repo setup needed: in
# Settings → Pages, set "Build and deployment" source to "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions required by actions/deploy-pages: read the repo, write to
# Pages, mint an OIDC token so the Pages deployment is verified.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; don't cancel in-flight
# runs because interrupting a deployment can leave Pages in a stuck
# "pending" state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          cache-dependency-glob: pyproject.toml

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Build the Sphinx site with -W
        run: uv run --group docs sphinx-build -b html -W docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
